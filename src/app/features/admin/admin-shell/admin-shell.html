
<div class="flex min-h-screen bg-rpg-bg">
  <!-- Sidebar -->
  <aside class="w-64 bg-rpg-card border-r border-rpg-border flex flex-col shrink-0">
    <div class="p-6 border-b border-rpg-border">
      <h1 class="font-rpg text-xl text-rpg-gold tracking-wide">La Expedición</h1>
      <p class="text-rpg-muted text-xs mt-1">Panel de Administración</p>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <a
        routerLink="/admin"
        routerLinkActive="bg-rpg-gold/10 text-rpg-gold border-rpg-gold"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-rpg-text
                   hover:bg-rpg-border/40 border border-transparent transition"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l9-9 9 9M5 10v10h14V10" />
        </svg>
        Dashboard
      </a>

      <a
        routerLink="/admin/items"
        routerLinkActive="bg-rpg-gold/10 text-rpg-gold border-rpg-gold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-rpg-text
                   hover:bg-rpg-border/40 border border-transparent transition"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10" />
        </svg>
        Gestión de Items
      </a>

      <a
        routerLink="/admin/expediciones"
        routerLinkActive="bg-rpg-gold/10 text-rpg-gold border-rpg-gold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-rpg-text
                   hover:bg-rpg-border/40 border border-transparent transition"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
        </svg>
        Expediciones
      </a>

      <a
        routerLink="/admin/usuarios"
        routerLinkActive="bg-rpg-gold/10 text-rpg-gold border-rpg-gold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-rpg-text
                   hover:bg-rpg-border/40 border border-transparent transition"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0" />
        </svg>
        Usuarios
      </a>
    </nav>

    <!-- User / logout -->
    <div class="p-4 border-t border-rpg-border">
      <div class="flex items-center justify-between">
            <span class="text-rpg-muted text-sm truncate">
              {{ auth.userName() }}
            </span>
        <button
          (click)="auth.logout()"
          class="text-rpg-danger hover:text-rpg-danger/70 text-sm transition"
          title="Cerrar sesión"
        >
          Salir
        </button>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-8 overflow-auto">
    <router-outlet />
  </main>
</div>
