
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="rpg-card w-full max-w-sm">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-rpg text-rpg-gold mb-2">La Expedición</h1>
          <p class="text-rpg-muted text-sm">Ingresa tus credenciales para continuar</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
          <div>
            <label class="rpg-label">Correo Electrónico</label>
            <input type="email" formControlName="email" class="rpg-input" placeholder="aventurero@gremio.com" />
          </div>

          <div>
            <label class="rpg-label">Contraseña</label>
            <input type="password" formControlName="password" class="rpg-input" placeholder="••••••••" />
          </div>

          <button type="submit" class="btn-primary w-full mt-6" [disabled]="loading()">
            @if (loading()) {
              <span class="inline-block w-4 h-4 border-2 border-rpg-bg/40 border-t-rpg-bg rounded-full animate-spin mr-2"></span>
            }
            Entrar
          </button>
        </form>

        <div class="mt-6 text-center text-sm text-rpg-muted">
          ¿Aún no tienes cuenta? 
          <a routerLink="/register" class="text-rpg-gold hover:underline">Regístrate</a>
        </div>
      </div>
    </div>
