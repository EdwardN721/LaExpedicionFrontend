
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="rpg-card w-full max-w-md">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-rpg text-rpg-gold mb-2">Crear Cuenta</h1>
          <p class="text-rpg-muted text-sm">Únete a la expedición y forja tu leyenda</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
          <div>
            <label class="rpg-label">Nombre</label>
            <input type="text" formControlName="nombre" class="rpg-input" placeholder="Tu nombre" />
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="rpg-label">Primer Apellido</label>
              <input type="text" formControlName="primerApellido" class="rpg-input" />
            </div>
            <div>
              <label class="rpg-label">Segundo Apellido <span class="text-xs text-rpg-border">(Opcional)</span></label>
              <input type="text" formControlName="segundoApellido" class="rpg-input" />
            </div>
          </div>

          <div>
            <label class="rpg-label">Correo Electrónico</label>
            <input type="email" formControlName="correo" class="rpg-input" placeholder="aventurero@gremio.com" />
          </div>

          <div>
            <label class="rpg-label">Teléfono</label>
            <input type="tel" formControlName="telefono" class="rpg-input" placeholder="555-0192" />
          </div>

          <div>
            <label class="rpg-label">Contraseña</label>
            <input type="password" formControlName="password" class="rpg-input" placeholder="••••••••" />
          </div>

          <button type="submit" class="btn-primary w-full mt-6" [disabled]="loading()">
            @if (loading()) {
              <span class="inline-block w-4 h-4 border-2 border-rpg-bg/40 border-t-rpg-bg rounded-full animate-spin mr-2"></span>
            }
            Registrarse
          </button>
        </form>

        <div class="mt-6 text-center text-sm text-rpg-muted">
          ¿Ya eres miembro del gremio? 
          <a routerLink="/login" class="text-rpg-gold hover:underline">Inicia Sesión</a>
        </div>
      </div>
    </div>
