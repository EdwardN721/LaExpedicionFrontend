<div class="flex h-screen bg-gray-950 text-gray-100 overflow-hidden font-sans">

  <aside class="hidden md:flex w-64 flex-col bg-gray-900 border-r border-gray-800 shadow-2xl relative z-20">
    <div class="p-6 text-center border-b border-gray-800 bg-gray-950/50">
      <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-500 uppercase tracking-widest drop-shadow-md">
        La Expedición
      </h2>
      <p class="text-xs text-gray-500 mt-2 font-medium">Jugador: <span class="text-purple-300">{{ userName() }}</span></p>
    </div>
    
    <nav class="flex-1 p-4 space-y-3 overflow-y-auto">
      <a routerLink="/play/personaje" routerLinkActive="bg-purple-900/40 text-purple-300 border-purple-500/50" class="flex items-center px-4 py-3 text-gray-400 rounded-xl hover:bg-gray-800 hover:text-white border border-transparent transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        <span class="font-semibold">Personaje</span>
      </a>
      <a routerLink="/play/inventario" routerLinkActive="bg-purple-900/40 text-purple-300 border-purple-500/50" class="flex items-center px-4 py-3 text-gray-400 rounded-xl hover:bg-gray-800 hover:text-white border border-transparent transition-all duration-200 group">
         <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        <span class="font-semibold">Inventario</span>
      </a>
      <a routerLink="/play/tienda" routerLinkActive="bg-purple-900/40 text-purple-300 border-purple-500/50" class="flex items-center px-4 py-3 text-gray-400 rounded-xl hover:bg-gray-800 hover:text-white border border-transparent transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        <span class="font-semibold text-yellow-500">Mercader</span>
      </a>
      <a routerLink="/play/mapa" routerLinkActive="bg-purple-900/40 text-purple-300 border-purple-500/50" class="flex items-center px-4 py-3 text-gray-400 rounded-xl hover:bg-gray-800 hover:text-white border border-transparent transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
        <span class="font-semibold">Mapa del Mundo</span>
      </a>
      <a routerLink="/play/historial" routerLinkActive="bg-purple-900/40 text-purple-300 border-purple-500/50" class="flex items-center px-4 py-3 text-gray-400 rounded-xl hover:bg-gray-800 hover:text-white border border-transparent transition-all duration-200 group">
        <svg class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="font-semibold">Bitácora (Historial)</span>
      </a>
    </nav>

    <div class="p-4 border-t border-gray-800">
      <button (click)="logout()" class="w-full flex justify-center items-center px-4 py-3 bg-red-950/30 text-red-400 rounded-xl hover:bg-red-900/60 hover:text-red-200 border border-red-900/50 transition-colors">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        Desconectar
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-950 relative">
    
    <header class="md:hidden bg-gray-900 border-b border-gray-800 px-5 py-4 flex justify-between items-center shadow-lg z-10">
      <h2 class="text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-500 uppercase tracking-widest">
        La Expedición
      </h2>
      <button (click)="logout()" class="text-gray-500 hover:text-red-400 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      </button>
    </header>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 pb-24 md:pb-6 relative z-0">
      <router-outlet></router-outlet>
    </div>

  </main>

  <nav class="md:hidden fixed bottom-0 w-full bg-gray-900/95 backdrop-blur-md border-t border-gray-800 flex justify-around p-2 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] pb-safe">
    <a routerLink="/play/personaje" routerLinkActive="text-purple-400 scale-110 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]" class="flex flex-col items-center p-2 text-gray-500 transition-all duration-300">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      <span class="text-[10px] uppercase font-bold tracking-wider">Héroe</span>
    </a>
    <a routerLink="/play/inventario" routerLinkActive="text-purple-400 scale-110 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]" class="flex flex-col items-center p-2 text-gray-500 transition-all duration-300">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      <span class="text-[10px] uppercase font-bold tracking-wider">Mochila</span>
    </a>
    <a routerLink="/play/mapa" routerLinkActive="text-purple-400 scale-110 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]" class="flex flex-col items-center p-2 text-gray-500 transition-all duration-300">
       <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
      <span class="text-[10px] uppercase font-bold tracking-wider">Mapa</span>
    </a>
    <a routerLink="/play/historial" routerLinkActive="text-purple-400 scale-110 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]" class="flex flex-col items-center p-2 text-gray-500 transition-all duration-300">
       <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span class="text-[10px] uppercase font-bold tracking-wider">Bitácora</span>
    </a>
  </nav>

</div>
